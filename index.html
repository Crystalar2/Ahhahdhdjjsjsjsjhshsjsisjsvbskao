<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* FULLSCREEN WRAPPER */
#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* MAIN IMAGE */
#img {
  width: 200px;
  margin-top: 10px;

  transform-origin: top center;
  transform: rotate(0deg);

  display: block;

  will-change: transform;
  backface-visibility: hidden;
}

/* FLASH IMAGE */
#flashImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;

  opacity: 0;
  pointer-events: none;
  z-index: 999;

  transition: opacity 0.05s;
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<!-- FLASH IMAGE -->
<img id="flashImg" src="aa.jpeg">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let flashImg = document.getElementById("flashImg");

let started = false;
let clickCount = 0;

// 🔊 softer creak
rotateAudio.volume = 0.2;

// 🎯 FIRST CLICK (start game)
img.addEventListener("click", () => {
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

// 🖱️ CLICK ANYWHERE → COUNT TO 3
document.addEventListener("click", () => {
  clickCount++;

  if (clickCount === 3) {
    triggerFlash();
    clickCount = 0; // reset
  }
});


// 🔄 SWING LOOP
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";

  img.style.transform = `rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    img.style.transform = `rotate(${angle2}deg)`;

    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}


// ⚡ FLASH + INVERT EFFECT
function triggerFlash() {
  let flashes = 6;
  let i = 0;

  let interval = setInterval(() => {
    if (i >= flashes) {
      clearInterval(interval);

      flashImg.style.opacity = 0;
      document.body.style.filter = "none";
      return;
    }

    if (i % 2 === 0) {
      flashImg.style.opacity = 1;
      document.body.style.filter = "invert(1)";
    } else {
      flashImg.style.opacity = 0;
      document.body.style.filter = "none";
    }

    i++;
  }, 100);
}
</script>

</body>
</html>
