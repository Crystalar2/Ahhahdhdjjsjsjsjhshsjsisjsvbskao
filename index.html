<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  transform: rotate(0deg) scale(1);
  display: block;
  will-change: transform;
  /* Smooth for the swing, but we will override this for the scare */
  transition: transform 2s ease-in-out; 
}

/* This class will make the image shake violently during the scare */
.shake {
  animation: shake 0.1s infinite;
}

@keyframes shake {
  0% { margin-left: 0px; }
  25% { margin-left: 10px; margin-top: 5px; }
  50% { margin-left: -10px; margin-top: 15px; }
  75% { margin-left: 5px; margin-top: -5px; }
  100% { margin-left: 0px; }
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

rotateAudio.volume = 0.2;

// START EVERYTHING
img.addEventListener("click", (e) => {
  e.stopPropagation(); // Prevents double-triggering
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

// REPEATABLE JUMPSCARE ON CLICK
document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerScare();
});

function rotateLoop() {
  if (isScaring) return; // Stop swinging while scaring
  
  let angle = (Math.random() * 30) - 15;
  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `rotate(${angle}deg) scale(1)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    if (!isScaring) rotateLoop();
  }, 2000);
}

function triggerScare() {
  isScaring = true;
  
  // 1. Play Sound
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // 2. Visual Scare: Zoom in and Shake
  img.style.transition = "transform 0.05s linear"; // Instant zoom
  img.style.transform = "scale(4) translateY(50px)"; // Big zoom
  img.classList.add("shake");

  // 3. Duration of the scare (3 seconds)
  setTimeout(() => {
    // Reset back to normal
    img.classList.remove("shake");
    img.style.transition = "transform 0.5s ease-out";
    img.style.transform = "scale(1) rotate(0deg)";
    
    // Allow clicking again after a short cooldown
    setTimeout(() => {
      isScaring = false;
      rotateLoop(); // Restart the swinging
    }, 500);
    
  }, 3000); 
}
</script>

</body>
</html>
