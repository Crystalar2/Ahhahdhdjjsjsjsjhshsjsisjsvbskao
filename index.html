<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- MotionBlurJS Library -->
<script src="https://cdn.jsdelivr.net/gh/Adir-SL/MotionBlurJS@main/motionblur.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* HANGING IMAGE - STAYS CLEAN */
#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  position: relative;
  z-index: 2;
  transition: transform 2s ease-in-out;
}

/* JUMPSCARE IMAGE - THE TARGET FOR ALL EFFECTS */
#scareImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  /* Ensure the filter transition is fast for the invert strobe */
  transition: opacity 0.1s;
}

/* VIOLENT SHAKE + INVERT(100%) FOR aa.jpeg */
@keyframes violentScare {
  0%   { transform: translate(0, 0) scale(1); filter: invert(0%); }
  10%  { transform: translate(-15px, -8px) scale(1.3); filter: invert(100%) contrast(500%); }
  25%  { transform: translate(15px, 9px) scale(1.1); filter: invert(0%); }
  40%  { transform: translate(-18px, 12px) scale(1.5); filter: invert(100%) contrast(1000%); }
  55%  { transform: translate(18px, -14px) scale(1.2); filter: invert(0%); }
  75%  { transform: translate(-16px, 6px) scale(1.6); filter: invert(100%) contrast(600%); }
  90%  { transform: translate(10px, -10px) scale(1.2); filter: invert(0%); }
  100% { transform: translate(0, 0) scale(1); filter: invert(0%); }
}

/* This class triggers the CSS side of the chaos */
.aa-scare-effect {
  animation: violentScare 0.05s infinite !important;
}
</style>
</head>

<body>

<div style="position:fixed; width:100%; display:flex; justify-content:center;">
  <img id="img" src="aa.png">
</div>

<!-- This is the image that gets shaken, blurred, and inverted -->
<img id="scareImg" src="aa.jpeg">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
const img = document.getElementById("img");
const scareImg = document.getElementById("scareImg");
const bgAudio = document.getElementById("bgAudio");
const rotateAudio = document.getElementById("rotateAudio");
const scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

// 1. Initialize MotionBlurJS on aa.jpeg ONLY
const mb = new MotionBlur(scareImg, {
  intensity: 4, // Cranked up for extra motion blur
  pulse: 0.2    // High pulse for stuttering effect
});

rotateAudio.volume = 0.2;

/* INITIAL CLICK TO START SWING */
img.addEventListener("click", (e) => {
  e.stopPropagation();
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

/* CLICK ANYWHERE TO TRIGGER aa.jpeg CHAOS */
document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerScare();
});

function rotateLoop() {
  if (isScaring) return;
  let angle = Math.random() * 40;
  img.style.transform = `rotate(${Math.random() > 0.5 ? -angle : angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    if (started && !isScaring) rotateLoop();
  }, 2000);
}

function triggerScare() {
  isScaring = true;

  // Sound reset
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // Start MotionBlurJS on aa.jpeg
  mb.start();

  // Apply Shake and Invert via CSS class
  scareImg.style.opacity = "1";
  scareImg.classList.add("aa-scare-effect");

  // Chaos duration (3 seconds for a long scare)
  setTimeout(() => {
    // Kill the effects
    mb.stop();
    scareImg.style.opacity = "0";
    scareImg.classList.remove("aa-scare-effect");
    
    // Cooldown
    setTimeout(() => {
      isScaring = false;
      rotateLoop(); // Go back to normal swing
    }, 500);
  }, 3000);
}
</script>

</body>
</html>
