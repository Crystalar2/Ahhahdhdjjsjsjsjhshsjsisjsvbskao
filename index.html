<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

.warning-bg {
  position: fixed;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  color: gray;
  opacity: 0.25;
  letter-spacing: 3px;
  font-weight: bold;
}

.pic {
  position: absolute;
  top: 0;
  left: 50%;
  width: 60vw;
  max-width: 300px;
  transform-origin: 50% 0%;
  transform: translateX(-50%);
  transition: transform 1.5s ease-in-out;
}

.target {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
}

#targetImg {
  width: 60vw;
  max-width: 300px;
}

@keyframes jumpscare {
  0% { transform: scale(0); }
  100% { transform: scale(5); opacity: 0; }
}
</style>
</head>

<body>

<div class="warning-bg">cấm ấn 3 lần</div>
<img src="aa.png" class="pic" id="pic">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg">
</div>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");

let audioCtx;
let buffers = {};

let started = false;
let direction = 1;
let currentAngle = 0;

/* 🔥 LOAD AUDIO */
async function loadSound(name, url) {
  const res = await fetch(url);
  const arrayBuffer = await res.arrayBuffer();
  buffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
}

/* 🔥 PLAY SOUND */
function playSound(name, volume = 1, loop = false) {
  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();

  source.buffer = buffers[name];
  source.loop = loop;

  gain.gain.value = volume;

  source.connect(gain);
  gain.connect(audioCtx.destination);

  source.start(0);
  return source;
}

/* 🪢 update */
function updatePic() {
  pic.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;
}

/* 🪢 swing */
function swing() {
  const angle = Math.random() * 34 + 1;
  direction *= -1;
  currentAngle = angle * direction;

  const duration = Math.random() * 1500 + 1000;
  pic.style.transitionDuration = duration + "ms";

  updatePic();

  // creak sound
  playSound("creak", Math.random() * 0.1 + 0.05);

  setTimeout(swing, duration);
}

/* ▶ START */
async function startExperience() {
  if (started) return;
  started = true;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // 🔥 MUST resume on user gesture
  await audioCtx.resume();

  // load all sounds
  await Promise.all([
    loadSound("bg", "bgaa.mp3"),
    loadSound("creak", "aa.mp3"),
    loadSound("scream", "aas.mp3")
  ]);

  // start bg loop
  playSound("bg", 0.2, true);

  swing();
}

document.body.addEventListener("click", startExperience, { once: true });
document.body.addEventListener("touchstart", startExperience, { once: true });

/* 👁 jumpscare */
let clickCount = 0;

function handleTap() {
  clickCount++;

  if (clickCount === 3) {
    clickCount = 0;

    playSound("scream", 1);

    target.style.opacity = "1";
    targetImg.style.animation = "jumpscare 0.7s linear";

    setTimeout(() => {
      target.style.opacity = "0";
      targetImg.style.animation = "";
    }, 700);
  }
}

pic.addEventListener("click", handleTap);
pic.addEventListener("touchstart", handleTap);
</script>

</body>
</html>
