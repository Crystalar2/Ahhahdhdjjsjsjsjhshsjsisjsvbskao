<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* normal image */
#img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: top center;
  transform: translate(-50%, -50%) rotate(0deg);
  width: 200px;
}

/* jumpscare */
#jumpscare {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  z-index: 999;
}
</style>
</head>

<body>

<img id="img" src="aa.png">
<img id="jumpscare" src="jumpscare.png">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="scare.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");
let jumpscare = document.getElementById("jumpscare");

let started = false;

// 🎯 FIRST CLICK
img.addEventListener("click", () => {
  if (!started) {
    started = true;

    bgAudio.play().catch(()=>{});
    rotateLoop();

    // ⏱️ trigger jumpscare randomly (3–8 seconds)
    let delay = Math.random() * 5000 + 3000;
    setTimeout(triggerJumpscare, delay);
  }
});


// 🔄 ROTATION LOOP
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `translate(-50%, -50%) rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    img.style.transform = `translate(-50%, -50%) rotate(${angle2}deg)`;

    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}


// 💀 JUMPSCARE
function triggerJumpscare() {
  jumpscare.style.display = "block";

  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});
}
</script>

</body>
</html>
