<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

#img {
  position: absolute;
  top: 100%;
  left: 50%;
  transform-origin: top center;
  transform: translate(-50%, -50%) rotate(0deg);
  width: 200px;
  -khtml-user-select: none;
  -o-user-select: none;
  -moz-user-select: none;
  -webkit-user-select: none;
  user-select: none;
}
</style>
</head>

<body>

<img id="img" src="aa.png">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");

let started = false; // only first click trigger

// 🎯 FIRST CLICK
img.addEventListener("click", () => {
  if (!started) {
    started = true;

    // play background loop
    bgAudio.play().catch(() => {});

    // start rotation loop
    rotateLoop();
  }
});


// 🔄 ROTATION LOOP
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";

  // LEFT
  img.style.transform = `translate(-50%, -50%) rotate(-${angle}deg)`;

  if (started) rotateAudio.play().catch(() => {});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    // RIGHT
    img.style.transform = `translate(-50%, -50%) rotate(${angle2}deg)`;

    if (started) rotateAudio.play().catch(() => {});

    // repeat forever
    setTimeout(rotateLoop, 2000);

  }, 2000);
}
</script>

</body>
</html>
