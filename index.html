<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

.warning-bg {
  position: fixed;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  color: gray;
  opacity: 0.25;
  letter-spacing: 3px;
  font-family: Arial;
  font-weight: bold;
  pointer-events: none;
}

.pic {
  position: absolute;
  top: 0;
  left: 50%;
  width: 60vw;
  max-width: 300px;
  transform-origin: 50% 0%;
  transform: translateX(-50%);
  transition: transform 1.5s ease-in-out;
  z-index: 2;
  touch-action: manipulation;
}

.target {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  z-index: 5;
}

#targetImg {
  width: 60vw;
  max-width: 300px;
  transform: scale(0);
}

/* 💀 animation */
@keyframes jumpscare {
  0% { transform: scale(0); opacity: 1; }
  10% { transform: scale(5); }
  100% { transform: scale(5); opacity: 0; }
}
</style>
</head>

<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg">
</div>

<audio id="scream" src="aas.mp3" preload="auto"></audio>
<audio id="creak" src="aa.mp3" preload="auto"></audio>
<audio id="bg" src="bgaa.mp3" preload="auto" loop></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const creak = document.getElementById("creak");
const scream = document.getElementById("scream");
const bg = document.getElementById("bg");

let direction = 1;
let currentAngle = 0;
let started = false;
let clickCount = 0;

/* 🔓 unlock audio */
function unlockAudio() {
  [bg, creak, scream].forEach(a => {
    a.muted = true;
    a.play().then(() => {
      a.pause();
      a.currentTime = 0;
      a.muted = false;
    }).catch(()=>{});
  });
}

/* 🪢 swing */
function updatePic() {
  pic.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;
}

function swing() {
  const angle = Math.random() * 34 + 1;
  direction *= -1;
  currentAngle = angle * direction;

  const duration = Math.random() * 1500 + 1000;
  pic.style.transitionDuration = duration + "ms";

  updatePic();

  bg.play().catch(()=>{});

  creak.currentTime = 0;
  creak.volume = 0.05;
  creak.play().catch(()=>{});

  setTimeout(swing, duration);
}

/* ▶ start */
function startExperience() {
  if (started) return;
  started = true;

  unlockAudio();
  swing();
}

document.body.addEventListener("pointerdown", startExperience, { once: true });

/* 👁 jumpscare FIXED */
pic.addEventListener("pointerdown", (e) => {
  e.stopPropagation(); // 🔥 prevent conflict

  clickCount++;

  if (clickCount === 3) {
    clickCount = 0;

    creak.currentTime = 0;
    creak.volume = 0.3;
    creak.play().catch(()=>{});

    target.style.opacity = "1";

    /* 🔥 FORCE animation restart (stable way) */
    targetImg.style.animation = "none";
    targetImg.style.transform = "scale(0)";

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        targetImg.style.animation = "jumpscare 0.7s linear";
      });
    });

    scream.currentTime = 0;
    scream.play().catch(()=>{});

    setTimeout(() => {
      target.style.opacity = "0";
      targetImg.style.animation = "";
      targetImg.style.transform = "scale(0)";
    }, 700);
  }
});

/* 🔁 keep audio alive */
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && started) {
    bg.play().catch(()=>{});
  }
});
</script>

</body>
</html>
