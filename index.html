<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  transition: filter 0.03s ease-in-out; /* Sharper transition */
}

#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#img {
  width: 250px; /* Made slightly larger for more impact */
  margin-top: 10px;
  transform-origin: top center;
  transform: rotate(0deg);
  display: block;
  will-change: transform;
  backface-visibility: hidden;
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

rotateAudio.volume = 0.2;

img.addEventListener("click", () => {
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerInvert();
});

function rotateLoop() {
  let angle = Math.random() * 40;
  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 40;
    img.style.transform = `rotate(${angle2}deg)`;
    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}

function triggerInvert() {
  isScaring = true;
  
  // --- SETTINGS ---
  let flashes = 30; // 3x longer than before (approx 2-3 seconds of chaos)
  let i = 0;

  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  let interval = setInterval(() => {
    if (i >= flashes) {
      clearInterval(interval);
      document.body.style.filter = "none";
      // Small cooldown before they can click again
      setTimeout(() => { isScaring = false; }, 500); 
      return;
    }

    // SCARY MODES
    if (i % 2 === 0) {
      // Deep-fried demonic look
      document.body.style.filter = "invert(1) contrast(1000%) saturate(50) hue-rotate(270deg) brightness(1.5)";
    } else if (i % 3 === 0) {
      // Blood red / High Exposure look
      document.body.style.filter = "invert(0.5) sepia(1) saturate(20) hue-rotate(0deg) brightness(2)";
    } else {
      // Pure Negative
      document.body.style.filter = "invert(1) brightness(5)";
    }

    i++;
  }, 70); // Slightly slower than 60ms makes the "longer" effect feel more agonizing
}
</script>

</body>
</html>
