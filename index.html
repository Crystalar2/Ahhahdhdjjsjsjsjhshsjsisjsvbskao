<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- MotionBlurJS Library -->
<script src="https://cdn.jsdelivr.net/gh/Adir-SL/MotionBlurJS@main/motionblur.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* HANGING IMAGE */
#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  position: relative;
  z-index: 2;
  transition: transform 2s ease-in-out;
}

/* JUMPSCARE IMAGE */
#scareImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
}

/* MODERATED SHAKE + INVERT(100%) */
@keyframes moderatedScare {
  0%   { transform: translate(0, 0); filter: invert(0%); }
  20%  { transform: translate(-20px, -10px); filter: invert(100%) contrast(200%); }
  40%  { transform: translate(25px, 15px); filter: invert(0%); }
  60%  { transform: translate(-25px, 20px); filter: invert(100%) contrast(300%); }
  80%  { transform: translate(20px, -15px); filter: invert(0%); }
  100% { transform: translate(0, 0); filter: invert(0%); }
}

.aa-scare-effect {
  /* Slightly slower cycle for a "shiver" look rather than a "teleport" look */
  animation: moderatedScare 0.12s infinite linear;
}
</style>
</head>

<body>

<div style="position:fixed; width:100%; display:flex; justify-content:center;">
  <img id="img" src="aa.png">
</div>

<img id="scareImg" src="aa.jpeg">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
const img = document.getElementById("img");
const scareImg = document.getElementById("scareImg");
const bgAudio = document.getElementById("bgAudio");
const rotateAudio = document.getElementById("rotateAudio");
const scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

// 1. Adjusted MotionBlurJS for aa.jpeg
const mb = new MotionBlur(scareImg, {
  intensity: 2, // Reduced from 8 (Less blur)
  pulse: 0.4    // Reduced from 0.9 (Smoother pulse)
});

rotateAudio.volume = 0.2;

img.addEventListener("click", (e) => {
  e.stopPropagation();
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerScare();
});

function rotateLoop() {
  if (isScaring) return;
  let angle = Math.random() * 30;
  img.style.transform = `rotate(${Math.random() > 0.5 ? -angle : angle}deg)`;
  
  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    if (started && !isScaring) rotateLoop();
  }, 2000);
}

function triggerScare() {
  isScaring = true;

  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // Start subtle MotionBlur
  mb.start();

  // Apply Shiver and Invert
  scareImg.style.opacity = "1";
  scareImg.classList.add("aa-scare-effect");

  // Scare lasts for 2 seconds
  setTimeout(() => {
    mb.stop();
    scareImg.style.opacity = "0";
    scareImg.classList.remove("aa-scare-effect");
    
    setTimeout(() => {
      isScaring = false;
      rotateLoop();
    }, 400);
  }, 2000);
}
</script>

</body>
</html>
