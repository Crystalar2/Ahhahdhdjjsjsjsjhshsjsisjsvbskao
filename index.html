<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumpscare</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* button */
#btn {
  position: absolute;
  z-index: 10;
  padding: 15px 25px;
  font-size: 20px;
}

/* image */
#scareImg {
  max-width: 100%;
  max-height: 100%;
  display: none;
  transform-origin: center;
}

/* SHAKE FIXED */
@keyframes shake {
  0% { transform: translate(15px, 20px) rotate(0deg); }
  25% { transform: translate(-9px, 13px) rotate(-2deg); }
  50% { transform: translate(20px, -12px) rotate(2deg); }
  75% { transform: translate(-25px, -30px) rotate(-1deg); }
  100% { transform: translate(9px, 0px) rotate(0deg); }
}

.shake {
  animation: shake 0.08s infinite;
}

.invert {
  filter: invert(1);
}
</style>
</head>

<body>

<button id="btn">CLICK</button>

<img id="fadejs scareImg" fadejs-data="opacity:0.6;" src="aa.jpeg">

<audio id="sound" src="aas.mp3"></audio>

<script src="https://adir-sl.github.io/MotionBlurJS/blur.js">
const btn = document.getElementById("btn");
const img = document.getElementById("scareImg");
const sound = document.getElementById("sound");

btn.onclick = () => {
  img.style.display = "block";

  sound.currentTime = 0;
  sound.play();

  img.classList.add("shake");
  img.classList.add("invert");

  setTimeout(() => {
    img.classList.remove("shake");
    img.classList.remove("invert");
    img.style.display = "none";
  }, 1500);
};
</script>

</body>
</html>
