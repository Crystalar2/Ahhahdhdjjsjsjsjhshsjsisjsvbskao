<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
    touch-action: none;
  }

  .warning-bg {
    position: fixed;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(128, 128, 128, 0.4);
    font-size: 24px;
    pointer-events: none;
  }

  /* 2s per swing - smooth and creepy */
  @keyframes swing {
    0% { transform: translateX(-50%) rotate(-15deg); }
    100% { transform: translateX(-50%) rotate(15deg); }
  }

  .pic {
    position: absolute;
    top: 0;
    left: 50%;
    width: 60vw;
    max-width: 300px;
    transform-origin: top center;
    animation: swing 2s ease-in-out infinite alternate;
    cursor: pointer;
    z-index: 5;
    outline: none;
  }

  .target {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
  }

  #targetImg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(0);
  }

  @keyframes jumpscare-hit {
    0% { transform: scale(0.5); opacity: 1; }
    5% { transform: scale(1.2); }
    10% { transform: scale(1); }
    90% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  .active-jumpscare { opacity: 1 !important; }
  .active-img { animation: jumpscare-hit 0.6s forwards; }
</style>
</head>
<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic" draggable="false">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg" draggable="false">
</div>

<!-- Added 'autoplay' and 'muted' then unmuting via JS for best chance of auto-play -->
<audio id="scream" src="aas.mp3"></audio>
<audio id="creak" src="aa.mp3"></audio>
<audio id="bg" src="bgaa.mp3" loop autoplay></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const scream = document.getElementById("scream");
const creak = document.getElementById("creak");
const bg = document.getElementById("bg");

let clickCount = 0;
let started = false;

// 1. SYNCED CREAK SOUND
// This triggers every 2 seconds to match the 'swing' animation timing
setInterval(() => {
  if (started) {
    creak.currentTime = 0;
    creak.volume = 0.3;
    creak.play().catch(() => {});
  }
}, 2000);

// 2. AUTOPLAY & INITIALIZATION
function initAudio() {
  if (started) return;
  started = true;
  
  // Try to play background music immediately
  bg.volume = 0.5;
  bg.play().catch(error => {
    console.log("Autoplay prevented by browser. Waiting for user interaction.");
  });
}

// Attempt to start as soon as the page loads
window.addEventListener('load', initAudio);

// Failsafe: start audio on first touch if autoplay was blocked
document.addEventListener('pointerdown', initAudio, { once: true });

// 3. JUMPSCARE LOGIC
function triggerJumpscare() {
  scream.currentTime = 0;
  scream.play().catch(() => {});

  target.classList.add("active-jumpscare");
  targetImg.classList.add("active-img");

  setTimeout(() => {
    target.classList.remove("active-jumpscare");
    targetImg.classList.remove("active-img");
  }, 600);
}

pic.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  
  // Every time they click the ghost, the count goes up
  clickCount++;

  if (clickCount >= 3) {
    clickCount = 0;
    triggerJumpscare();
  }
});
</script>
</body>
</html>
