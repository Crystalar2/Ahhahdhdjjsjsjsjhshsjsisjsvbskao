<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* text */
.warning-bg {
  position: fixed;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  color: gray;
  opacity: 0.3;
  font-size: 24px;
}

/* picture */
.pic {
  position: absolute;
  top: 0;
  left: 50%;
  width: 60vw;
  max-width: 300px;
  transform-origin: top center;
  transform: translateX(-50%);
  transition: transform 1s;
}

/* jumpscare */
.target {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
}

#targetImg {
  width: 60vw;
  max-width: 300px;
}

/* animation */
@keyframes jumpscare {
  from { transform: scale(0); }
  to { transform: scale(5); }
}
</style>
</head>

<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg">
</div>

<audio id="scream" src="aas.mp3"></audio>
<audio id="creak" src="aa.mp3"></audio>
<audio id="bg" src="bgaa.mp3" loop></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const scream = document.getElementById("scream");
const creak = document.getElementById("creak");
const bg = document.getElementById("bg");

let started = false;
let clickCount = 0;

/* START */
document.body.addEventListener("pointerdown", () => {
  if (started) return;
  started = true;

  bg.play().catch(()=>{});
});

/* SWING */
let angle = 0;
setInterval(() => {
  angle = -angle || 20;
  pic.style.transform = `translateX(-50%) rotate(${angle}deg)`;
}, 1500);

/* CLICK IMAGE */
pic.addEventListener("pointerdown", () => {
  clickCount++;

  creak.currentTime = 0;
  creak.play().catch(()=>{});

  if (clickCount === 3) {
    clickCount = 0;

    target.style.opacity = "1";
    targetImg.style.animation = "jumpscare 0.5s forwards";

    scream.currentTime = 0;
    scream.play().catch(()=>{});

    setTimeout(() => {
      target.style.opacity = "0";
      targetImg.style.animation = "";
    }, 500);
  }
});
</script>

</body>
</html>
