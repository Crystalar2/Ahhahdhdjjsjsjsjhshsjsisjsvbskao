<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- MotionBlurJS Library - Ensure this stays in the HEAD -->
<script src="https://cdn.jsdelivr.net/gh/Adir-SL/MotionBlurJS@main/motionblur.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  user-select: none;
}

/* HANGING IMAGE */
#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  position: relative;
  z-index: 2;
  transition: transform 2s ease-in-out;
  cursor: pointer;
}

/* JUMPSCARE IMAGE */
#scareImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  transition: opacity 0.1s;
}

/* VIOLENT SHAKE + INVERT */
@keyframes violentScare {
  0%   { transform: translate(0, 0) scale(1); filter: invert(0%); }
  10%  { transform: translate(-150px, -80px) scale(1.3); filter: invert(100%) contrast(500%); }
  25%  { transform: translate(150px, 90px) scale(1.1); filter: invert(0%); }
  40%  { transform: translate(-180px, 120px) scale(1.5); filter: invert(100%) contrast(1000%); }
  55%  { transform: translate(180px, -140px) scale(1.2); filter: invert(0%); }
  75%  { transform: translate(-160px, 60px) scale(1.6); filter: invert(100%) contrast(600%); }
  90%  { transform: translate(100px, -100px) scale(1.2); filter: invert(0%); }
  100% { transform: translate(0, 0) scale(1); filter: invert(0%); }
}

.aa-scare-effect {
  animation: violentScare 0.05s infinite !important;
}

.wrap {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: center;
}
</style>
</head>

<body>

<div class="wrap">
  <img id="img" src="aa.png">
</div>

<img id="scareImg" src="aa.jpeg">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
const img = document.getElementById("img");
const scareImg = document.getElementById("scareImg");
const bgAudio = document.getElementById("bgAudio");
const rotateAudio = document.getElementById("rotateAudio");
const scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;
let mb; // Define motion blur variable

// Initialize once library is loaded
window.onload = () => {
  if (typeof MotionBlur !== 'undefined') {
    mb = new MotionBlur(scareImg, {
      intensity: 8,
      pulse: 0.9
    });
  }
};

rotateAudio.volume = 0.2;

/* HANDLE ALL CLICKS */
document.addEventListener("click", (e) => {
  // If not started, start the background loop
  if (!started) {
    started = true;
    bgAudio.play().catch(err => console.log("Audio waiting for interaction"));
    rotateLoop();
    return; // Don't scare on the very first click
  }

  // Trigger scare if not already scaring
  if (!isScaring) {
    triggerScare();
  }
});

function rotateLoop() {
  if (isScaring || !started) return;

  let angle = (Math.random() * 40) - 20;
  img.style.transform = `rotate(${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  // Schedule next swing
  setTimeout(() => {
    rotateLoop();
  }, 2000);
}

function triggerScare() {
  isScaring = true;

  // Sound
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // MotionBlur Start
  if (mb) mb.start();

  // CSS Chaos
  scareImg.style.opacity = "1";
  scareImg.classList.add("aa-scare-effect");

  // Chaos duration (3 seconds)
  setTimeout(() => {
    if (mb) mb.stop();
    scareImg.style.opacity = "0";
    scareImg.classList.remove("aa-scare-effect");
    
    // Reset and force restart the swing
    isScaring = false;
    setTimeout(() => {
        rotateLoop();
    }, 100); 
  }, 3000);
}
</script>

</body>
</html>
