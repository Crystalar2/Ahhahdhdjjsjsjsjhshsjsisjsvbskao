<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* FULLSCREEN WRAPPER (no more cropping) */
#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;   /* center horizontally */
  align-items: flex-start;   /* stick to top */
}

/* IMAGE */
#img {
  width: 200px;
  margin-top: 10px;

  transform-origin: top center;
  transform: rotate(0deg);

  display: block;

  /* anti-glitch */
  will-change: transform;
  backface-visibility: hidden;
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");

let started = false;

// 🔊 softer creak sound
rotateAudio.volume = 0.2;

// 🎯 FIRST CLICK
img.addEventListener("click", () => {
  if (!started) {
    started = true;

    // play background (loops)
    bgAudio.play().catch(()=>{});

    // start swinging
    rotateLoop();
  }
});


// 🔄 SWING LOOP
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";

  // LEFT
  img.style.transform = `rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    // RIGHT
    img.style.transform = `rotate(${angle2}deg)`;

    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}
</script>

</body>
</html>
