<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumpscare</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* trigger button */
#btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 20px;
  z-index: 10;
}

/* jumpscare image */
#scareImg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 100%;
  max-height: 100%;
  display: none;
  transform-origin: center;
}

/* shake animation ONLY for image */
@keyframes shake {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  25% { transform: translate(-52%, -48%) rotate(-2deg); }
  50% { transform: translate(-48%, -52%) rotate(2deg); }
  75% { transform: translate(-51%, -49%) rotate(-1deg); }
  100% { transform: translate(-50%, -50%) rotate(0deg); }
}

.shake {
  animation: shake 0.1s infinite;
}

/* invert ONLY image */
.invert {
  filter: invert(1);
}
</style>
</head>

<body>

<button id="btn">CLICK</button>

<img id="scareImg" src="aa.jpeg">

<audio id="sound" src="aas.mp3"></audio>

<script>
const btn = document.getElementById("btn");
const img = document.getElementById("scareImg");
const sound = document.getElementById("sound");

btn.onclick = () => {
  img.style.display = "block";

  // restart sound every click
  sound.currentTime = 0;
  sound.play();

  // shake + invert ONLY image
  img.classList.add("shake");
  img.classList.add("invert");

  // reset after 1.5s
  setTimeout(() => {
    img.classList.remove("shake");
    img.classList.remove("invert");
    img.style.display = "none";
  }, 1500);
};
</script>

</body>
</html>
