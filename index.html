<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
    touch-action: none;
  }

  .warning-bg {
    position: fixed;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(128, 128, 128, 0.4);
    font-size: 24px;
    pointer-events: none;
  }

  /* 2s per swing direction change */
  @keyframes swing {
    0% { transform: translateX(-50%) rotate(-15deg); }
    100% { transform: translateX(-50%) rotate(15deg); }
  }

  .pic {
    position: absolute;
    top: 0;
    left: 50%;
    width: 60vw;
    max-width: 300px;
    transform-origin: top center;
    animation: swing 2s ease-in-out infinite alternate;
    cursor: pointer;
    z-index: 5;
    outline: none;
  }

  .target {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
  }

  #targetImg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(0);
  }

  @keyframes jumpscare-hit {
    0% { transform: scale(0.5); opacity: 1; }
    5% { transform: scale(1.2); }
    10% { transform: scale(1); }
    90% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  .active-jumpscare { opacity: 1 !important; }
  .active-img { animation: jumpscare-hit 0.6s forwards; }
</style>
</head>
<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic" draggable="false">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg" draggable="false">
</div>

<audio id="scream" src="aas.mp3"></audio>
<audio id="creak" src="aa.mp3"></audio>
<audio id="bg" src="bgaa.mp3" loop></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const scream = document.getElementById("scream");
const creak = document.getElementById("creak");
const bg = document.getElementById("bg");

let clickCount = 0;
let started = false;
let creakInterval;

// Function to handle the auto-creaking sync
function startCreakLoop() {
  // Play immediately once
  playCreak();
  // Then repeat every 2 seconds to match the swing
  creakInterval = setInterval(playCreak, 2000);
}

function playCreak() {
  creak.currentTime = 0;
  creak.volume = 0.3;
  creak.play().catch(() => {});
}

// Function to trigger the jumpscare
function triggerJumpscare() {
  scream.currentTime = 0;
  scream.play().catch(() => {});

  target.classList.add("active-jumpscare");
  targetImg.classList.add("active-img");

  setTimeout(() => {
    target.classList.remove("active-jumpscare");
    targetImg.classList.remove("active-img");
  }, 600);
}

// THE TRIGGER: Everything starts on the first click of the picture
pic.addEventListener("pointerdown", (e) => {
  e.preventDefault();

  // 1. Start audio experience on first interaction
  if (!started) {
    started = true;
    
    // Start background music looping
    bg.volume = 0.5;
    bg.play().catch(err => console.log("Audio play failed:", err));
    
    // Start the synchronized creaking
    startCreakLoop();
  }

  // 2. Count clicks for the jumpscare
  clickCount++;

  if (clickCount >= 3) {
    clickCount = 0;
    triggerJumpscare();
  }
});
</script>
</body>
</html>
