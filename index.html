<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* WRAPPER (fix glitch line) */
#wrap {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  overflow: hidden;
}

/* IMAGE */
#img {
  display: block;
  width: 200px;

  transform-origin: top center;
  transform: rotate(0deg);

  /* 🔥 anti-glitch fixes */
  will-change: transform;
  backface-visibility: hidden;
  transform-style: preserve-3d;
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");

let started = false;

// 🔊 softer creak sound
rotateAudio.volume = 0.1;

// 🎯 FIRST CLICK
img.addEventListener("click", () => {
  if (!started) {
    started = true;

    // unlock + play bg audio
    bgAudio.play().catch(()=>{});

    // start swinging
    rotateLoop();
  }
});


// 🔄 ROTATION LOOP (smooth swing)
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";

  // LEFT
  img.style.transform = `rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    // RIGHT
    img.style.transform = `rotate(${angle2}deg)`;

    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}
</script>

</body>
</html>
