<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* ⚠️ BACKGROUND WARNING TEXT */
.warning-bg {
  position: fixed;
  top: 100%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 28px;
  color: gray;
  opacity: 0.25;
  letter-spacing: 3px;
  font-family: Arial, sans-serif;
  font-weight: bold;

  z-index: 0;
  pointer-events: none;
}

/* 🪢 hanging picture */
.pic {
  position: absolute;
  top: 0;
  left: 50%;
  width: 40vw;
  max-width: 250px;

  transform-origin: 50% 0%;
  transform: translateX(-50%);
  transition: transform 1.5s ease-in-out;

  z-index: 2;
}

/* 👁 fullscreen center */
.target {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;

  z-index: 5;
}

/* 👁 jumpscare image */
#targetImg {
  width: 40vw;
  max-width: 250px;

  transform: scale(0);
  opacity: 0;

  transition: none;
}

/* 💀 jumpscare animation */
@keyframes jumpscare {
  0% {
    transform: scale(0);
    opacity: 1;
    filter: invert(0);
  }

  10% {
    transform: scale(5);
  }

  20% { filter: invert(1); }
  30% { filter: invert(0); }
  40% { filter: invert(1); }
  50% { filter: invert(0); }
  60% { filter: invert(1); }
  70% { filter: invert(0); }
  80% { filter: invert(1); }

  100% {
    transform: scale(5);
    opacity: 0;
    filter: invert(0);
  }
}

/* 💧 drops */
.drop {
  position: absolute;
  width: 3px;
  height: 10px;
  background: white;
  border-radius: 50%;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg">
</div>

<audio id="scream" src="aas.mp3"></audio>
<audio id="creak" src="aa.mp3" preload="auto"></audio>
<audio id="bg" src="bgaa.mp3" loop></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const creak = document.getElementById("creak");
const scream = document.getElementById("scream");
const bg = document.getElementById("bg");

let direction = 1;
let currentAngle = 0;

function updatePic() {
  pic.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;
}

function swing() {
  const angle = Math.random() * 34 + 1;
  direction *= -1;

  currentAngle = angle * direction;

  const duration = Math.random() * 1500 + 1000;
  pic.style.transitionDuration = duration + "ms";

  updatePic();

  bg.play().catch(()=>{});

  creak.currentTime = 0;
  creak.playbackRate = Math.random() * 0.4 + 0.8;
  creak.volume = 0.05;
  creak.play().catch(()=>{});

  setTimeout(swing, duration);
}

let clickCount = 0;

pic.addEventListener("click", () => {
  clickCount++;

  if (clickCount === 3) {
    clickCount = 0;

    creak.currentTime = 0;
    creak.volume = 0.3;
    creak.play();

    target.style.opacity = "1";
    targetImg.style.animation = "jumpscare 0.7s linear";
    scream.play();

    setTimeout(() => {
      target.style.opacity = "0";
      targetImg.style.animation = "";
      targetImg.style.transform = "scale(0)";
    }, 700);
  }
});

document.body.addEventListener("click", () => {
  swing();
}, { once: true });
</script>

</body>
</html>
