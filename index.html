<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* HANGING IMAGE */
#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  transform: rotate(0deg);
  position: relative;
  z-index: 2;
}

/* JUMPSCARE IMAGE */
#scareImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
}

/* VIOLENT SHAKE + INVERT + BLUR */
/* We use large translate values for "Violent" movement */
@keyframes violentScare {
  0%   { transform: translate(0, 0) scale(1); filter: invert(0) blur(0px); }
  10%  { transform: translate(-50px, -20px) scale(1.1); filter: invert(1) contrast(2) blur(5px); }
  20%  { transform: translate(50px, 30px) scale(1.05); filter: invert(0) blur(2px); }
  30%  { transform: translate(-60px, 40px) scale(1.2); filter: invert(1) contrast(3) blur(10px); }
  40%  { transform: translate(70px, -50px) scale(1.1); filter: invert(0) blur(4px); }
  50%  { transform: translate(-80px, 20px) scale(1.3); filter: invert(1) contrast(2) blur(15px); }
  60%  { transform: translate(90px, -30px) scale(1.15); filter: invert(0) blur(2px); }
  70%  { transform: translate(-50px, 60px) scale(1.2); filter: invert(1) contrast(4) blur(12px); }
  80%  { transform: translate(40px, -40px) scale(1.1); filter: invert(0) blur(5px); }
  90%  { transform: translate(-20px, 50px) scale(1.25); filter: invert(1) contrast(2) blur(8px); }
  100% { transform: translate(0, 0) scale(1); filter: invert(0) blur(0px); }
}

.scare-active {
  /* 0.08s makes it extremely fast and jittery */
  animation: violentScare 0.08s infinite;
}
</style>

</head>

<body>

<div style="position:fixed; width:100%; display:flex; justify-content:center;">
  <img id="img" src="aa.png">
</div>

<img id="scareImg" src="aa.jpeg">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
let img = document.getElementById("img");
let scareImg = document.getElementById("scareImg");

let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

rotateAudio.volume = 0.2;

/* START */
img.addEventListener("click", (e) => {
  e.stopPropagation();
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

/* TRIGGER ON EVERY CLICK */
document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerScare();
});

function rotateLoop() {
  if (isScaring) return;
  let angle = Math.random() * 35;
  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `rotate(${Math.random() > 0.5 ? -angle : angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    if (!isScaring) rotateLoop();
  }, 2000);
}

function triggerScare() {
  isScaring = true;

  // Restart scare sound
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // Activate Visuals
  scareImg.style.opacity = "1";
  scareImg.classList.add("scare-active");

  // Duration: 2 seconds of high-intensity chaos
  setTimeout(() => {
    scareImg.style.opacity = "0";
    scareImg.classList.remove("scare-active");
    
    setTimeout(() => {
      isScaring = false;
      rotateLoop(); // Go back to swinging
    }, 300);
  }, 2000);
}
</script>

</body>
</html>
