<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumpscare</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* button */
#btn {
  position: absolute;
  z-index: 10;
  padding: 15px 25px;
  font-size: 20px;
}

/* image */
#scareImg {
  max-width: 100%;
  max-height: 100%;
  display: none;
  transform-origin: center;
  will-change: transform;
  z-index: 5;
}

/* 🔥 VIOLENT SHAKE + MOTION BLUR */
@keyframes violentShake {
  0%   { transform: translate(0,0) rotate(0deg);   filter: blur(0px); }
  10%  { transform: translate(-20px, 12px) rotate(-6deg); filter: blur(1px); }
  20%  { transform: translate(20px, -12px) rotate(6deg); filter: blur(2px); }
  30%  { transform: translate(-25px, 15px) rotate(-8deg); filter: blur(3px); }
  40%  { transform: translate(25px, -15px) rotate(8deg); filter: blur(3px); }
  50%  { transform: translate(-15px, 10px) rotate(-5deg); filter: blur(2px); }
  60%  { transform: translate(15px, -10px) rotate(5deg); filter: blur(2px); }
  70%  { transform: translate(-10px, 6px) rotate(-3deg); filter: blur(1px); }
  80%  { transform: translate(10px, -6px) rotate(3deg); filter: blur(1px); }
  100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
}

.shake {
  animation: violentShake 0.12s infinite;
}
</style>
</head>

<body>

<button id="btn">CLICK</button>

<img id="scareImg" src="aa.jpeg">

<audio id="sound" src="aas.mp3"></audio>

<script>
const btn = document.getElementById("btn");
const img = document.getElementById("scareImg");
const sound = document.getElementById("sound");

btn.onclick = () => {

  // show image
  img.style.display = "block";

  // restart sound every click
  sound.currentTime = 0;
  sound.play();

  // reset animation (so it retriggers every time)
  img.classList.remove("shake");
  void img.offsetWidth; // force reflow trick
  img.classList.add("shake");

  // hide after scare
  setTimeout(() => {
    img.classList.remove("shake");
    img.style.display = "none";
  }, 1500);
};
</script>

</body>
</html>
