<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  transition: filter 0.05s ease-in-out;
}

#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  transform: rotate(0deg) scale(1);
  display: block;
  will-change: transform, filter;
  backface-visibility: hidden;
  transition: transform 2s ease-in-out;
}

/* Violent shake animation */
.shake {
  animation: jitter 0.1s infinite;
}

@keyframes jitter {
  0% { transform: scale(4) translate(0, 50px); }
  25% { transform: scale(4.1) translate(5px, 55px); }
  50% { transform: scale(3.9) translate(-5px, 45px); }
  75% { transform: scale(4) translate(3px, 52px); }
  100% { transform: scale(4) translate(0, 50px); }
}
</style>
</head>

<body>

<div id="wrap">
  <!-- UPDATED FILENAME TO aa.jpeg -->
  <img id="img" src="aa.jpeg">
</div>

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

rotateAudio.volume = 0.2;

// START ON FIRST CLICK
document.addEventListener("click", () => {
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
    // Don't trigger the scare on the VERY first click to avoid skipping the intro
    return; 
  }

  // TRIGGER REPEATABLE JUMPSCARE
  if (!isScaring) {
    triggerScare();
  }
});

function rotateLoop() {
  if (isScaring) return;
  
  let angle = (Math.random() * 40) - 20;
  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `rotate(${angle}deg) scale(1)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    if (!isScaring) rotateLoop();
  }, 2000);
}

function triggerScare() {
  isScaring = true;
  
  // 1. Play Sound
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // 2. Visual Chaos
  img.classList.add("shake");
  
  let flashes = 40; // Long duration
  let i = 0;

  let flashInterval = setInterval(() => {
    if (i >= flashes) {
      clearInterval(flashInterval);
      // RESET
      document.body.style.filter = "none";
      img.classList.remove("shake");
      img.style.transition = "transform 0.5s ease-out";
      img.style.transform = "scale(1) rotate(0deg)";
      
      setTimeout(() => {
        isScaring = false;
        rotateLoop(); // Restart the swing
      }, 500);
      return;
    }

    // SCARY INVERTED LOOKS
    if (i % 2 === 0) {
      document.body.style.filter = "invert(1) contrast(800%) hue-rotate(180deg) brightness(1.5)";
    } else {
      document.body.style.filter = "none";
    }

    i++;
  }, 60); // Fast pulse
}
</script>

</body>
</html>
