<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* ⚠️ TEXT */
.warning-bg {
  position: fixed;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  color: gray;
  opacity: 0.25;
  letter-spacing: 3px;
  font-family: Arial;
  font-weight: bold;
  pointer-events: none;
}

/* 🪢 picture */
.pic {
  position: absolute;
  top: 0;
  left: 50%;
  width: 60vw;
  max-width: 300px;
  transform-origin: 50% 0%;
  transform: translateX(-50%);
  transition: transform 1.5s ease-in-out;
  z-index: 2;
  touch-action: manipulation;
}

/* 👁 jumpscare */
.target {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  z-index: 5;
}

/* 👁 image */
#targetImg {
  width: 60vw;
  max-width: 300px;
  transform: scale(0);
}

/* 💀 jumpscare anim */
@keyframes jumpscare {
  0% { transform: scale(0); opacity: 1; filter: invert(0); }
  10% { transform: scale(5); }
  20% { filter: invert(1); }
  40% { filter: invert(0); }
  60% { filter: invert(1); }
  80% { filter: invert(0); }
  100% { transform: scale(5); opacity: 0; }
}

/* 📳 SCREEN SHAKE */
@keyframes shake {
  0% { transform: translate(0,0); }
  10% { transform: translate(-10px,5px); }
  20% { transform: translate(10px,-5px); }
  30% { transform: translate(-8px,8px); }
  40% { transform: translate(8px,-8px); }
  50% { transform: translate(-5px,5px); }
  60% { transform: translate(5px,-5px); }
  70% { transform: translate(-3px,3px); }
  80% { transform: translate(3px,-3px); }
  90% { transform: translate(-2px,2px); }
  100% { transform: translate(0,0); }
}

.shake {
  animation: shake 0.7s;
}
</style>
</head>

<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg">
</div>

<audio id="scream" src="aas.mp3"></audio>
<audio id="creak" src="aa.mp3" preload="auto"></audio>
<audio id="bg" src="bgaa.mp3" loop></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const creak = document.getElementById("creak");
const scream = document.getElementById("scream");
const bg = document.getElementById("bg");

let direction = 1;
let currentAngle = 0;
let started = false;
let clickCount = 0;

/* 🔓 unlock audio */
function unlockAudio() {
  [bg, creak, scream].forEach(a => {
    a.muted = true;
    a.play().then(() => {
      a.pause();
      a.currentTime = 0;
      a.muted = false;
    }).catch(()=>{});
  });
}

/* 🪢 swing */
function updatePic() {
  pic.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;
}

function swing() {
  const angle = Math.random() * 34 + 1;
  direction *= -1;
  currentAngle = angle * direction;

  const duration = Math.random() * 1500 + 1000;
  pic.style.transitionDuration = duration + "ms";

  updatePic();

  bg.play().catch(()=>{});

  creak.currentTime = 0;
  creak.playbackRate = Math.random() * 0.4 + 0.8;
  creak.volume = 0.05;
  creak.play().catch(()=>{});

  setTimeout(swing, duration);
}

/* ▶ start */
function startExperience() {
  if (started) return;
  started = true;
  unlockAudio();
  swing();
}

/* tap fix */
function addTapListener(el, fn) {
  let tapped = false;

  el.addEventListener("touchstart", (e) => {
    tapped = true;
    fn(e);
  });

  el.addEventListener("click", (e) => {
    if (!tapped) fn(e);
    tapped = false;
  });
}

addTapListener(document.body, startExperience);

/* 👁 jumpscare */
function handleTap() {
  clickCount++;

  if (clickCount === 3) {
    clickCount = 0;

    /* 📳 VIBRATE */
    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 200]);
    }

    /* 📳 SCREEN SHAKE */
    document.body.classList.add("shake");
    setTimeout(() => {
      document.body.classList.remove("shake");
    }, 700);

    creak.currentTime = 0;
    creak.volume = 0.3;
    creak.play().catch(()=>{});

    target.style.opacity = "1";

    /* 🔥 restart animation */
    targetImg.style.animation = "none";
    targetImg.offsetHeight;
    targetImg.style.animation = "jumpscare 0.7s linear";

    scream.play().catch(()=>{});

    setTimeout(() => {
      target.style.opacity = "0";
      targetImg.style.animation = "";
      targetImg.style.transform = "scale(0)";
    }, 700);
  }
}

addTapListener(pic, handleTap);

/* fix audio after tab switch */
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && started) {
    bg.play().catch(()=>{});
  }
});
</script>

</body>
</html>
