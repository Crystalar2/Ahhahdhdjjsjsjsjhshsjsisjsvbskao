<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
    touch-action: none; /* Prevents accidental zooming/scrolling */
  }

  .warning-bg {
    position: fixed;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(128, 128, 128, 0.4);
    font-size: 24px;
    pointer-events: none;
  }

  /* SMOOTH SWINGING ANIMATION */
  @keyframes swing {
    0% { transform: translateX(-50%) rotate(-15deg); }
    100% { transform: translateX(-50%) rotate(15deg); }
  }

  .pic {
    position: absolute;
    top: 0;
    left: 50%;
    width: 60vw;
    max-width: 300px;
    transform-origin: top center;
    /* Apply the smooth animation here */
    animation: swing 2s ease-in-out infinite alternate;
    cursor: pointer;
    z-index: 5;
  }

  /* JUMPSCARE OVERLAY */
  .target {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
  }

  #targetImg {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Makes the scare fill the screen */
    transform: scale(0);
  }

  @keyframes jumpscare-hit {
    0% { transform: scale(0.5); opacity: 1; }
    5% { transform: scale(1.2); }
    10% { transform: scale(1); }
    90% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  .active-jumpscare {
    opacity: 1 !important;
  }
  .active-img {
    animation: jumpscare-hit 0.6s forwards;
  }
</style>
</head>
<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg">
</div>

<!-- Audio -->
<audio id="scream" src="aas.mp3"></audio>
<audio id="creak" src="aa.mp3"></audio>
<audio id="bg" src="bgaa.mp3" loop></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const scream = document.getElementById("scream");
const creak = document.getElementById("creak");
const bg = document.getElementById("bg");

let clickCount = 0;
let started = false;

// Function to handle the jumpscare
function triggerJumpscare() {
  // Play sound immediately
  scream.currentTime = 0;
  scream.play().catch(e => console.log("Scream blocked:", e));

  // Trigger CSS animations
  target.classList.add("active-jumpscare");
  targetImg.classList.add("active-img");

  // Reset after animation finishes
  setTimeout(() => {
    target.classList.remove("active-jumpscare");
    targetImg.classList.remove("active-img");
  }, 600);
}

// Global click listener to unlock audio
document.addEventListener('pointerdown', () => {
  if (!started) {
    bg.play().catch(() => {});
    started = true;
  }
});

pic.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  
  clickCount++;
  
  // Play creak
  creak.currentTime = 0;
  creak.volume = 0.5;
  creak.play().catch(() => {});

  if (clickCount >= 3) {
    clickCount = 0;
    triggerJumpscare();
  }
});
</script>
</body>
</html>
