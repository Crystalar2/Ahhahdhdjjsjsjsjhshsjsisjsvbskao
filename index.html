<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* HANGING IMAGE */
#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  transform: rotate(0deg);
  position: relative;
  z-index: 2;
}

/* JUMPSCARE IMAGE */
#scareImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  /* High-speed transition for blur effect */
  transition: filter 0.03s linear;
}

/* VIOLENT SHAKE + SCALE (From W3Schools / MotionBlur logic) */
@keyframes shakeBlur {
  0% { transform: translate(1px, 1px) scale(1.01); filter: blur(0px); }
  10% { transform: translate(-2px, -3px) scale(1.05); filter: blur(2px); }
  20% { transform: translate(-4px, 0px) scale(1.02); filter: blur(5px); }
  30% { transform: translate(4px, 3px) scale(1.08); filter: blur(1px); }
  40% { transform: translate(2px, -2px) scale(1.03); filter: blur(8px); }
  50% { transform: translate(-2px, 3px) scale(1.1); filter: blur(3px); }
  60% { transform: translate(-4px, 2px) scale(1.04); filter: blur(10px); }
  70% { transform: translate(4px, 2px) scale(1.09); filter: blur(2px); }
  80% { transform: translate(-2px, -2px) scale(1.02); filter: blur(7px); }
  90% { transform: translate(2px, 3px) scale(1.06); filter: blur(1px); }
  100% { transform: translate(2px, -3px) scale(1.01); filter: blur(0px); }
}

.scare-active {
  animation: shakeBlur 0.1s infinite;
}
</style>

</head>

<body>

<div style="position:fixed; width:100%; display:flex; justify-content:center;">
  <img id="img" src="aa.png">
</div>

<img id="scareImg" src="aa.jpeg">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
let img = document.getElementById("img");
let scareImg = document.getElementById("scareImg");

let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

rotateAudio.volume = 0.2;

/* START */
img.addEventListener("click", (e) => {
  e.stopPropagation();
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

/* TRIGGER ON EVERY CLICK */
document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerScare();
});

/* SWING LOGIC */
function rotateLoop() {
  if (isScaring) return;
  let angle = Math.random() * 35;
  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `rotate(${angle % 2 === 0 ? -angle : angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    if (!isScaring) rotateLoop();
  }, 2000);
}

/* SHAKE & BLUR ONLY */
function triggerScare() {
  isScaring = true;

  // 1. Reset and Play Sound
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // 2. Show Image and Start Animation
  scareImg.style.opacity = "1";
  scareImg.classList.add("scare-active");

  // 3. Shake Duration (2.5 seconds)
  setTimeout(() => {
    scareImg.style.opacity = "0";
    scareImg.classList.remove("scare-active");
    
    // Cool down before next scare
    setTimeout(() => {
      isScaring = false;
      rotateLoop();
    }, 200);
  }, 2500);
}
</script>

</body>
</html>
