<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- MotionBlurJS Library -->
<script src="https://cdn.jsdelivr.net/gh/Adir-SL/MotionBlurJS@main/motionblur.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  user-select: none;
}

/* HANGING IMAGE (aa.png) */
#img {
  width: 200px;
  margin-top: 10px;
  transform-origin: top center;
  position: relative;
  z-index: 2;
  /* Smooth swing transition */
  transition: transform 2s ease-in-out;
  cursor: pointer;
}

/* JUMPSCARE IMAGE (aa.jpeg) */
#scareImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-id: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
}

/* MODERATED SHAKE + INVERT(100%) */
@keyframes moderatedScare {
  0%   { transform: translate(0, 0); filter: invert(0%); }
  20%  { transform: translate(-25px, -15px); filter: invert(100%) contrast(200%); }
  40%  { transform: translate(30px, 20px); filter: invert(0%); }
  60%  { transform: translate(-30px, 25px); filter: invert(100%) contrast(300%); }
  80%  { transform: translate(25px, -20px); filter: invert(0%); }
  100% { transform: translate(0, 0); filter: invert(0%); }
}

.aa-scare-effect {
  /* Fast vibration look */
  animation: moderatedScare 0.1s infinite linear;
}

#wrap {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: center;
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<img id="scareImg" src="aa.jpeg">

<!-- Audio Elements -->
<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
const img = document.getElementById("img");
const scareImg = document.getElementById("scareImg");
const bgAudio = document.getElementById("bgAudio");
const rotateAudio = document.getElementById("rotateAudio");
const scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;
let swingTimeout;

// 1. Initialize MotionBlurJS on aa.jpeg
const mb = new MotionBlur(scareImg, {
  intensity: 3, // Balanced blur
  pulse: 0.5    // Natural pulse
});

rotateAudio.volume = 0.2;

/* INITIAL CLICK ON aa.png TO START */
img.addEventListener("click", (e) => {
  e.stopPropagation(); // Prevents immediate jumpscare on start
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

/* CLICK ANYWHERE TO TRIGGER JUMPSCARE */
document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerScare();
});

/* SWING LOGIC */
function rotateLoop() {
  if (isScaring || !started) return;

  // Clear any existing timeouts to prevent "double swinging"
  clearTimeout(swingTimeout);

  let angle = (Math.random() * 40) - 20; // Random angle between -20 and 20
  img.style.transform = `rotate(${angle}deg)`;
  
  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  // Schedule the next move
  swingTimeout = setTimeout(rotateLoop, 2000);
}

/* JUMPSCARE LOGIC (aa.jpeg) */
function triggerScare() {
  isScaring = true;
  clearTimeout(swingTimeout); // Stop the swing timer

  // 1. Sound
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  // 2. MotionBlurJS Start
  mb.start();

  // 3. Shake and Invert Class
  scareImg.style.opacity = "1";
  scareImg.classList.add("aa-scare-effect");

  // 4. Scare Duration (2 seconds)
  setTimeout(() => {
    // Stop Effects
    mb.stop();
    scareImg.style.opacity = "0";
    scareImg.classList.remove("aa-scare-effect");
    
    // Reset flags and restart swing
    isScaring = false;
    
    // Small delay before swing resumes for smoothness
    setTimeout(rotateLoop, 200); 
  }, 2000);
}
</script>

</body>
</html>
