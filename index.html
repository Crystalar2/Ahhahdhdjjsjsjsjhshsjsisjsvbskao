<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  transition: filter 0.05s ease-in-out;
}

/* CENTER */
#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* NORMAL IMAGE */
#img {
  width: 200px;
  margin-top: 10px;

  transform-origin: top center;
  transform: rotate(0deg);
}

/* JUMPSCARE IMAGE (hidden by default) */
#scareImg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  object-fit: cover;

  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<img id="scareImg" src="aa.jpeg">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
let img = document.getElementById("img");
let scareImg = document.getElementById("scareImg");

let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");

let started = false;
let isScaring = false;

rotateAudio.volume = 0.2;

/* START */
img.addEventListener("click", () => {
  if (!started) {
    started = true;
    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});

/* TRIGGER */
document.addEventListener("click", () => {
  if (!started || isScaring) return;
  triggerInvert();
});

/* SWING */
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    img.style.transform = `rotate(${angle2}deg)`;

    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}

/* SCARY EFFECT */
function triggerInvert() {
  isScaring = true;

  let flashes = 10;
  let i = 0;

  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  let interval = setInterval(() => {
    if (i >= flashes) {
      clearInterval(interval);
      document.body.style.filter = "none";
      scareImg.style.opacity = 0;
      isScaring = false;
      return;
    }

    if (i % 2 === 0) {
      document.body.style.filter = "invert(1) contrast(2)";
      scareImg.style.opacity = 1;   // SHOW JUMPSCARE
    } else {
      document.body.style.filter = "none";
      scareImg.style.opacity = 0;   // HIDE
    }

    i++;
  }, 60);
}
</script>

</body>
</html>
