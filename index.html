<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

/* text */
.warning-bg {
  position: fixed;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  color: gray;
  opacity: 0.3;
  font-size: 24px;
}

/* picture */
.pic {
  position: absolute;
  top: 0;
  left: 50%;
  width: 60vw;
  max-width: 300px;
  transform-origin: top center;
  transform: translateX(-50%);
  transition: transform 1s;
  touch-action: manipulation;
}

/* jumpscare */
.target {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
}

#targetImg {
  width: 60vw;
  max-width: 300px;
  transform: scale(0);
}

/* animation */
@keyframes jumpscare {
  0% { transform: scale(0); opacity: 1; }
  10% { transform: scale(5); }
  100% { transform: scale(5); opacity: 0; }
}
</style>
</head>

<body>

<div class="warning-bg">cấm ấn 3 lần</div>

<img src="aa.png" class="pic" id="pic">

<div class="target" id="target">
  <img src="aa.jpeg" id="targetImg">
</div>

<audio id="scream" src="aas.mp3" preload="auto"></audio>
<audio id="creak" src="aa.mp3" preload="auto"></audio>
<audio id="bg" src="bgaa.mp3" preload="auto" loop></audio>

<script>
const pic = document.getElementById("pic");
const target = document.getElementById("target");
const targetImg = document.getElementById("targetImg");
const scream = document.getElementById("scream");
const creak = document.getElementById("creak");
const bg = document.getElementById("bg");

let started = false;
let clickCount = 0;

/* 🔥 unlock + start audio */
function startExperience() {
  if (started) return;
  started = true;

  [bg, creak, scream].forEach(a => {
    a.muted = true;
    a.play().then(() => {
      a.pause();
      a.currentTime = 0;
      a.muted = false;
    }).catch(()=>{});
  });

  bg.volume = 0.5;
  bg.play().catch(()=>{});
}

/* start on first tap */
document.body.addEventListener("pointerdown", startExperience, { once: true });

/* swing */
let angle = 20;
setInterval(() => {
  angle = -angle;
  pic.style.transform = `translateX(-50%) rotate(${angle}deg)`;
}, 1500);

/* image click */
pic.addEventListener("pointerdown", (e) => {
  e.stopPropagation();

  clickCount++;

  creak.currentTime = 0;
  creak.volume = 0.1;
  creak.play().catch(()=>{});

  if (clickCount === 3) {
    clickCount = 0;

    target.style.opacity = "1";

    /* 🔥 restart animation */
    targetImg.style.animation = "none";
    targetImg.offsetHeight;
    targetImg.style.animation = "jumpscare 0.7s linear";

    scream.currentTime = 0;
    scream.play().catch(()=>{});

    setTimeout(() => {
      target.style.opacity = "0";
      targetImg.style.animation = "";
      targetImg.style.transform = "scale(0)";
    }, 700);
  }
});

/* keep audio alive */
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && started) {
    bg.play().catch(()=>{});
  }
});
</script>

</body>
</html>
