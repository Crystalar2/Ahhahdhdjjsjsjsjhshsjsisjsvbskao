<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* FULLSCREEN WRAPPER */
#wrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* MAIN IMAGE */
#img {
  width: 200px;
  margin-top: 10px;

  transform-origin: top center;
  transform: rotate(0deg);

  display: block;

  will-change: transform;
  backface-visibility: hidden;
}
</style>
</head>

<body>

<div id="wrap">
  <img id="img" src="aa.png">
</div>

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>
<audio id="scareAudio" src="aas.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");
let scareAudio = document.getElementById("scareAudio");

let started = false;
let triggered = false;

// 🔊 softer creak
rotateAudio.volume = 0.2;

// 🎯 FIRST CLICK (unlock ALL audio)
img.addEventListener("click", () => {
  if (!started) {
    started = true;

    // 🔥 UNLOCK audio (important for mobile)
    bgAudio.play().catch(()=>{});
    scareAudio.play().then(()=>{
      scareAudio.pause();
      scareAudio.currentTime = 0;
    }).catch(()=>{});

    rotateLoop();
  }
});

// ⚡ CLICK ANYWHERE ONCE → TRIGGER
document.addEventListener("click", () => {
  if (!started) return;
  if (triggered) return;

  triggered = true;
  triggerInvert();
});

// 🔄 SWING LOOP
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";
  img.style.transform = `rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    img.style.transform = `rotate(${angle2}deg)`;

    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}

// 🎨 INVERT FLASH + SOUND
function triggerInvert() {
  let flashes = 6;
  let i = 0;

  // 🔊 PLAY SOUND (now works)
  scareAudio.currentTime = 0;
  scareAudio.play().catch(()=>{});

  let interval = setInterval(() => {
    if (i >= flashes) {
      clearInterval(interval);
      document.body.style.filter = "none";
      return;
    }

    if (i % 2 === 0) {
      document.body.style.filter = "invert(1) brightness(2)";
    } else {
      document.body.style.filter = "none";
    }

    i++;
  }, 100);
}
</script>

</body>
</html>
