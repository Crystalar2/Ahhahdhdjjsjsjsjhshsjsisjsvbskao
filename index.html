<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* IMAGE AT TOP CENTER */
#img {
  position: absolute;
  top: 0;
  left: 50%;
  transform-origin: top center;
  transform: translateX(-50%) rotate(0deg);
  width: 200px;
}
</style>
</head>

<body>

<img id="img" src="aa.png">

<audio id="bgAudio" src="bgaa.mp3" loop></audio>
<audio id="rotateAudio" src="aa.mp3"></audio>

<script>
let img = document.getElementById("img");
let bgAudio = document.getElementById("bgAudio");
let rotateAudio = document.getElementById("rotateAudio");

let started = false;

// 🔊 set creak volume LOWER
rotateAudio.volume = 0.2; // change 0.0 → 1.0 if you want

// 🎯 FIRST CLICK
img.addEventListener("click", () => {
  if (!started) {
    started = true;

    bgAudio.play().catch(()=>{});
    rotateLoop();
  }
});


// 🔄 ROTATION LOOP
function rotateLoop() {
  let angle = Math.random() * 35;

  img.style.transition = "transform 2s ease-in-out";

  // LEFT
  img.style.transform = `translateX(-50%) rotate(-${angle}deg)`;

  rotateAudio.currentTime = 0;
  rotateAudio.play().catch(()=>{});

  setTimeout(() => {
    let angle2 = Math.random() * 35;

    // RIGHT
    img.style.transform = `translateX(-50%) rotate(${angle2}deg)`;

    rotateAudio.currentTime = 0;
    rotateAudio.play().catch(()=>{});

    setTimeout(rotateLoop, 2000);
  }, 2000);
}
</script>

</body>
</html>
